<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Our Influencers | Mashhor Hub — Elite Creator Network</title>
    <link rel="stylesheet" href="../assets/css/mashhor-platform.css">
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="page-shell platform-page">
    <div data-platform-header></div>
    <main>
        <section class="hero subhero">
            <div class="subhero-panel">
                <p class="eyebrow">Elite Creator Network</p>
                <h1>Meet the influencers who <span>move markets.</span></h1>
                <p class="lead">Our curated roster features vetted creators across Kuwait, GCC, and Egypt.</p>
                <div class="hero-actions">
                    <a class="button button-gold" href="../contact.html">Book a Creator</a>
                    <a class="ghost-button" href="join.html">Join as Influencer</a>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <p class="eyebrow">Browse by Category</p>
                <h2>Find the perfect creator for <span>your next campaign.</span></h2>
            </div>
            
            <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:48px;">
                <button class="tag active" data-filter="all">All</button>
                <button class="tag" data-filter="lifestyle">Lifestyle</button>
                <button class="tag" data-filter="tech">Tech</button>
                <button class="tag" data-filter="beauty">Beauty</button>
                <button class="tag" data-filter="business">Business</button>
            </div>

            <div class="grid-3" data-cms="influencer-grid">
                <!-- Dynamic grid -->
            </div>
        </section>
    </main>
    <div data-platform-footer></div>
</div>

<script src="../assets/js/mashhor-platform.js"></script>
<script src="../assets/js/cms-bridge.js"></script>
</body>
</html>
