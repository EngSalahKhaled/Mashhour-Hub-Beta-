<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة محتوى جديد | مشهور هب</title>
    <link rel="stylesheet" href="../../assets/css/mashhor-platform.css">
    <link rel="stylesheet" href="../../assets/css/rtl.css">
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0a0a0b; 
            font-family: 'Alexandria', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .bg-glow {
            position: fixed;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.08) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .setup-container { width: 100%; max-width: 1200px; padding: 40px; text-align: center; position: relative; }
        .setup-header h1 { font-weight: 800; font-size: 2.5rem; margin-bottom: 15px; color: #fff; }
        .setup-header p { color: #94a3b8; margin-bottom: 60px; font-size: 1.1rem; }

        .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; padding: 0 5%; }
        .type-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px);
            border-radius: 24px; padding: 50px 30px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            cursor: pointer; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            text-decoration: none; color: inherit;
            position: relative;
        }
        .type-card:hover { 
            transform: translateY(-15px); 
            border-color: #8b5cf6; 
            background: rgba(139, 92, 246, 0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); 
        }
        
        .type-icon { 
            width: 90px; height: 90px; border-radius: 24px; 
            background: rgba(139, 92, 246, 0.1); 
            margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; 
            font-size: 2.5rem; color: #8b5cf6;
            transition: 0.3s;
        }
        .type-card:hover .type-icon { transform: scale(1.1) rotate(5deg); background: #8b5cf6; color: #fff; }
        
        .type-name { font-weight: 800; font-size: 1.4rem; margin-bottom: 15px; color: #fff; }
        .type-desc { font-size: 0.9rem; color: #94a3b8; line-height: 1.7; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="setup-container">
        <div class="setup-header">
            <h1>درّس على مشهور</h1>
            <p>اختر الطريقة التي تفضلها لتقديم محتواك اليوم!</p>
        </div>

        <div class="type-grid">
            <!-- Recorded -->
            <a href="editor.html?type=recorded" class="type-card">
                <div class="type-icon">📺</div>
                <div class="type-name">دورة مسجلة</div>
                <div class="type-desc">أضف ملفات الفيديو لدورتك المسجلة مسبقاً هنا لبيعها باستمرار.</div>
            </a>

            <!-- In-Person -->
            <a href="editor.html?type=offline" class="type-card">
                <div class="type-icon">👥</div>
                <div class="type-name">دورة حضورية</div>
                <div class="type-desc">أنشئ دورة جديدة بنظام الحضور الشخصي أو الأوفلاين في مكان محدد.</div>
            </a>

            <!-- Live -->
            <a href="editor.html?type=live" class="type-card">
                <div class="type-icon">📡</div>
                <div class="type-name">دورة مباشرة (Live)</div>
                <div class="type-desc">أنشئ جلسات أو دورات تفاعلية مباشرة عبر الإنترنت في وقت محدد.</div>
            </a>
        </div>
    </div>
</body>
</html>
