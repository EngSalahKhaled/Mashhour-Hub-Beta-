<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر الإبداع AI | مشهور هب</title>
    <link rel="stylesheet" href="../assets/css/mashhor-platform.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        .portal-layout { display: flex; min-height: 100vh; background: #0f172a; color: #fff; }
        .portal-sidebar { width: 260px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; }
        .portal-main { flex: 1; padding: 40px; }
        
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 12px; color: #94a3b8; text-decoration: none; border-radius: 10px; transition: 0.2s; }
        .nav-link.active { background: #334155; color: #3b82f6; font-weight: 600; }

        .creative-container { max-width: 1000px; margin: 0 auto; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px; }
        
        .gen-box { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .prompt-area textarea { 
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid #475569; border-radius: 16px; 
            padding: 20px; color: #fff; font-family: inherit; resize: none; outline: none; margin-bottom: 20px;
        }
        .result-area { 
            background: rgba(0,0,0,0.3); border: 2px dashed #334155; border-radius: 24px; 
            display: flex; align-items: center; justify-content: center; min-height: 400px; position: relative; overflow: hidden;
        }
        .result-area img { max-width: 100%; max-height: 100%; display: none; }
        .loader { border: 4px solid #334155; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; display: none; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .option-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .option-btn { background: #334155; border: 1px solid #475569; color: #cbd5e1; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; text-align: center; }
        .option-btn.active { border-color: #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.1); }

        .magic-btn { 
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); color: #fff; width: 100%; 
            padding: 15px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; transition: 0.3s;
        }
        .magic-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body>
    <div class="portal-layout">
        <!-- Sidebar -->
        <aside class="portal-sidebar">
            <div class="mb-8"><img src="../assets/images/icons/logo.png" alt="Logo" style="height: 35px; filter: brightness(0) invert(1);"></div>
            <nav>
                <a href="dashboard.html" class="nav-link"><i>🏠</i> الرئيسية</a>
                <a href="creative-lab.html" class="nav-link active"><i>🎨</i> مختبر الإبداع</a>
                <a href="apps.html" class="nav-link"><i>🧩</i> التطبيقات</a>
            </nav>
        </aside>

        <!-- Main -->
        <main class="portal-main">
            <div class="creative-container">
                <h1 style="font-weight: 800; margin-bottom: 10px;">مختبر الإبداع AI</h1>
                <p style="color: #94a3b8; margin-bottom: 40px;">حوّل أفكارك إلى صور احترافية لمنشوراتك الإعلانية بضغطة زر</p>

                <div class="glass-card">
                    <div class="gen-box">
                        <div class="prompt-area">
                            <label style="display: block; margin-bottom: 12px; font-weight: 700;">وصف الصورة (Prompt)</label>
                            <textarea id="image-prompt" placeholder="مثال: رائد أعمال شاب في مكتب عصري يطل على مدينة دبي، نمط سينمائي، إضاءة درامية..." rows="5"></textarea>
                            
                            <label style="display: block; margin-bottom: 12px; font-weight: 700;">النمط الفني</label>
                            <div class="option-grid">
                                <div class="option-btn active" data-style="cinematic">سينمائي 🎬</div>
                                <div class="option-btn" data-style="digital">رقمي 💻</div>
                                <div class="option-btn" data-style="3d">ثلاثي الأبعاد 🧊</div>
                                <div class="option-btn" data-style="anime">أنمي ⛩️</div>
                                <div class="option-btn" data-style="realistic">واقعي 📸</div>
                                <div class="option-btn" data-style="art">فني 🎨</div>
                            </div>

                            <button id="generate-btn" class="magic-btn">توليد الصورة السحرية ✨</button>
                        </div>

                        <div class="result-area" id="result-container">
                            <div class="loader" id="loader"></div>
                            <img id="output-image" src="" alt="AI Output">
                            <p id="placeholder-text" style="color: #475569; font-size: 0.9rem;">ستظهر الصورة هنا...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const genBtn = document.getElementById('generate-btn');
        const promptInput = document.getElementById('image-prompt');
        const resultImg = document.getElementById('output-image');
        const loader = document.getElementById('loader');
        const placeholder = document.getElementById('placeholder-text');

        // Style selection
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        genBtn.addEventListener('click', async () => {
            const prompt = promptInput.value.trim();
            if (!prompt) return alert('يرجى إدخال وصف للصورة');

            const style = document.querySelector('.option-btn.active').dataset.style;
            const fullPrompt = `${prompt}, ${style} style, high resolution, 8k, professional lightning`;

            // Start loading
            genBtn.disabled = true;
            genBtn.innerText = 'جاري الإبداع... 🪄';
            loader.style.display = 'block';
            resultImg.style.display = 'none';
            placeholder.style.display = 'none';

            try {
                // We use Pollinations.ai for high-quality free generation
                const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(fullPrompt)}?width=1024&height=1024&nologo=true&seed=${Math.floor(Math.random() * 100000)}`;
                
                // Preload image
                const img = new Image();
                img.src = imageUrl;
                img.onload = () => {
                    resultImg.src = imageUrl;
                    resultImg.style.display = 'block';
                    loader.style.display = 'none';
                    genBtn.disabled = false;
                    genBtn.innerText = 'توليد الصورة السحرية ✨';
                };
            } catch (err) {
                alert('حدث خطأ أثناء توليد الصورة');
                loader.style.display = 'none';
                placeholder.style.display = 'block';
                genBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
