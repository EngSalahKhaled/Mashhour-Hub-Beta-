<style>
/* ═══ PROFILE PREMIUM STYLES ═══ */
:root { --p-gold: #f4cd55; --p-bg: #0a0a0b; }
body { background: var(--p-bg); color: #fff; font-family: 'Alexandria', sans-serif; }

.profile-hero { position: relative; height: 400px; overflow: hidden; }
.profile-cover { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; filter: blur(2px); }
.profile-hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, var(--p-bg)); }

.profile-container { max-width: 1200px; margin: -120px auto 80px; padding: 0 24px; position: relative; z-index: 10; }

.profile-header-box { display: flex; align-items: flex-end; gap: 40px; margin-bottom: 50px; }
.profile-avatar-wrap { position: relative; }
.profile-avatar { width: 200px; height: 200px; border-radius: 50px; border: 6px solid var(--p-bg); background: var(--p-bg); overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
.profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
.profile-tier-badge { position: absolute; bottom: -10px; right: -10px; width: 54px; height: 54px; background: var(--p-bg); border-radius: 18px; padding: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.1); }

.profile-info { flex: 1; padding-bottom: 20px; }
.profile-info h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800; margin: 0 0 8px; display: flex; align-items: center; gap: 15px; }
.profile-field { color: var(--p-gold); font-weight: 700; font-size: 1.2rem; display: block; margin-bottom: 20px; }

.profile-main { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; }

/* Bio Section */
.glass-panel { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 32px; padding: 40px; backdrop-filter: blur(20px); margin-bottom: 40px; }
.panel-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
.panel-title::before { content: ''; width: 4px; height: 24px; background: var(--p-gold); border-radius: 2px; }
.bio-content { font-size: 1.05rem; line-height: 1.9; color: rgba(255,255,255,0.8); }

/* Booking Card */
.booking-card { background: linear-gradient(145deg, rgba(244,205,85,0.15) 0%, rgba(244,205,85,0.05) 100%); border: 1px solid rgba(244,205,85,0.2); border-radius: 32px; padding: 40px; text-align: center; }
.booking-card h3 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; }
.booking-card p { color: rgba(255,255,255,0.7); margin-bottom: 32px; font-size: 0.95rem; }

.btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 18px; border-radius: 18px; background: #25d366; color: #fff; font-weight: 800; font-size: 1.1rem; text-decoration: none; transition: 0.3s; box-shadow: 0 20px 40px rgba(37,211,102,0.2); }
.btn-whatsapp:hover { transform: translateY(-5px); box-shadow: 0 25px 50px rgba(37,211,102,0.3); }

/* Social Icons */
.social-links { display: flex; gap: 12px; justify-content: center; margin-top: 30px; }
.social-link { width: 50px; height: 50px; border-radius: 15px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; color: #fff; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
.social-link:hover { background: var(--p-gold); color: #000; border-color: var(--p-gold); }

@media (max-width: 992px) {
    .profile-main { grid-template-columns: 1fr; }
    .profile-header-box { flex-direction: column; align-items: center; text-align: center; gap: 24px; }
    .profile-container { margin-top: -160px; }
}
</style>

        <div data-platform-footer></div>

    <script src="../assets/js/mashhor-platform.js"></script>
    <script>
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('username');
        const apiBase = window.location.origin.replace('3000', '5000');

        const VERIFICATION_ICONS = {
            gold: '../assets/images/verification/Verified_Badge_Gold.svg',
            blue: '../assets/images/verification/Verified_Badge.svg',
            green: '../assets/images/verification/verified-symbol-green.svg'
        };

        async function loadProfile() {
            if (!username) {
                window.location.href = '../discover.html';
                return;
            }

            try {
                const res = await fetch(`${apiBase}/api/portal/profile/public/${username}`);
                const data = await res.json();
                
                if (data.success) {
                    const p = data.profile;
                    document.getElementById('page-title').innerText = `${p.pageName} | ملف المبدع`;
                    document.getElementById('user-name').innerText = p.pageName;
                    document.getElementById('user-field').innerText = p.workField || p.category || 'مبدع مشهور هب';
                    document.getElementById('user-bio').innerText = p.longBio || p.bio || 'لا يوجد نبذة تعريفية حالياً.';
                    
                    if (p.logoUrl) document.getElementById('avatar-img').src = p.logoUrl;
                    if (p.coverUrl) document.getElementById('cover-img').src = p.coverUrl;
                    
                    const tier = p.verificationTier || (p.isGold ? 'gold' : p.isVerified ? 'blue' : 'green');
                    document.getElementById('tier-badge').src = VERIFICATION_ICONS[tier] || VERIFICATION_ICONS.blue;

                    // Booking Link
                    const waNum = p.whatsappNumber || '96555377309'; // Fallback to agency
                    const msg = encodeURIComponent(`مرحباً ${p.pageName}، أود الاستفسار عن حجز لفعالية/إعلان عبر مشهور هب.`);
                    document.getElementById('whatsapp-link').href = `https://wa.me/${waNum}?text=${msg}`;

                    // Socials
                    const socials = document.getElementById('social-links');
                    if (p.socialLinks) {
                        for (const [key, url] of Object.entries(p.socialLinks)) {
                            if (url && url !== '#') {
                                socials.innerHTML += `<a href="${url}" class="social-link" target="_blank">${key[0].toUpperCase()}</a>`;
                            }
                        }
                    }
                }
            } catch (e) { console.error('Load Profile Error', e); }
        }

        loadProfile();
    })();
    </script>
