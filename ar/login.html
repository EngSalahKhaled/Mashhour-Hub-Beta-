<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | مشهور هب</title>
    <link rel="stylesheet" href="../assets/css/mashhor-platform.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0b; font-family: 'Alexandria', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .bg-glow { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, rgba(0,0,0,0) 70%); z-index: -1; bottom: -200px; left: -200px; }
        .login-card { background: rgba(20, 20, 22, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 35px; width: 450px; padding: 50px; box-shadow: 0 40px 100px rgba(0,0,0,0.5); position: relative; }
        .brand-logo { text-align: center; margin-bottom: 35px; }
        .brand-logo img { height: 45px; filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.3)); }
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-weight: 600; font-size: 0.85rem; color: #94a3b8; margin-bottom: 12px; }
        .input-group input { width: 100%; padding: 16px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.3); color: #fff; font-family: inherit; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: #8b5cf6; background: rgba(0, 0, 0, 0.5); }
        .button-gold { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); color: #fff; width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3); font-size: 1rem; }
        .button-gold:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(139, 92, 246, 0.4); }
        .footer-link { text-align: center; margin-top: 35px; font-size: 0.9rem; color: #94a3b8; }
        .footer-link a { color: #8b5cf6; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="portal-login-container">
        <div class="login-card">
            <div class="brand-logo">
                <img src="../assets/images/icons/logo.png" alt="Logo">
                <h2 style="color: #fff; font-weight: 800; margin-top: 15px;">مرحباً بعودتك</h2>
                <p style="color: #94a3b8; font-size: 0.9rem;">سجل دخولك للوصول إلى لوحة التحكم</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" name="email" required placeholder="mail@mashhor-hub.com">
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
                <div style="text-align: left; margin-bottom: 25px;">
                    <a href="#" style="color: #94a3b8; font-size: 0.85rem; text-decoration: none;">نسيت كلمة المرور؟</a>
                </div>
                <button type="submit" class="button-gold">تسجيل الدخول ✨</button>
            </form>
            <div class="footer-link">ليس لديك حساب؟ <a href="signup.html">أنشئ حساباً الآن</a></div>
        </div>
    </div>
</body>
</html>
