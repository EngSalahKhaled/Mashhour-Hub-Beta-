<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل حساب جديد | مشهور هب</title>
    <link rel="stylesheet" href="../assets/css/mashhor-platform.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0b; font-family: 'Alexandria', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .bg-glow { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(0,0,0,0) 70%); z-index: -1; top: -200px; right: -200px; }
        .signup-card { background: rgba(20, 20, 22, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 35px; width: 480px; padding: 50px; box-shadow: 0 40px 100px rgba(0,0,0,0.5); position: relative; }
        .brand-logo { text-align: center; margin-bottom: 35px; }
        .brand-logo img { height: 45px; filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.3)); }
        .role-selector { display: flex; gap: 15px; margin-bottom: 35px; }
        .role-option { flex: 1; text-align: center; padding: 20px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); background: rgba(255, 255, 255, 0.02); cursor: pointer; transition: 0.3s; }
        .role-option.active { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.1); }
        .role-icon { font-size: 2rem; margin-bottom: 10px; display: block; }
        .role-label { font-weight: 800; font-size: 0.9rem; color: #fff; }
        .role-sub { font-size: 0.7rem; color: #94a3b8; margin-top: 5px; display: block; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.85rem; color: #94a3b8; margin-bottom: 12px; }
        .form-control { width: 100%; padding: 16px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.3); color: #fff; font-family: inherit; outline: none; }
        .form-control:focus { border-color: #8b5cf6; background: rgba(0, 0, 0, 0.5); }
        .btn-submit { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); color: #fff; width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; margin-top: 15px; transition: 0.3s; box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3); font-size: 1rem; }
        .footer-link { text-align: center; margin-top: 35px; font-size: 0.9rem; color: #94a3b8; }
        .footer-link a { color: #8b5cf6; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="signup-card">
        <div class="brand-logo"><img src="../assets/images/icons/logo.png" alt="Mashhor Hub Logo"></div>
        <h2 style="font-weight: 800; text-align: center; margin-bottom: 12px; color: #fff; font-size: 1.8rem;">انضم لعائلة مشهور</h2>
        <p style="text-align: center; color: #94a3b8; font-size: 0.95rem; margin-bottom: 40px;">اختر نوع الحساب وابدأ رحلة النمو معنا</p>
        <div class="role-selector">
            <div class="role-option active" data-role="influencer">
                <span class="role-icon">🤳</span>
                <span class="role-label">مؤثر / صانع</span>
                <span class="role-sub">بيع دوراتك وخدماتك</span>
            </div>
            <div class="role-option" data-role="company">
                <span class="role-icon">🏢</span>
                <span class="role-label">شركة / براند</span>
                <span class="role-sub">ابحث عن مؤثرين</span>
            </div>
        </div>
        <form id="signup-form">
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" class="form-control" placeholder="أدخل اسمك هنا..." required>
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" class="form-control" placeholder="example@mashhor-hub.com" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">إنشاء حساب مجاني ✨</button>
        </form>
        <div class="footer-link">لديك حساب بالفعل؟ <a href="login.html">سجل دخولك الآن</a></div>
    </div>
    <script>
        document.querySelectorAll('.role-option').forEach(role => {
            role.addEventListener('click', () => {
                document.querySelectorAll('.role-option').forEach(r => r.classList.remove('active'));
                role.classList.add('active');
            });
        });
    </script>
</body>
</html>
