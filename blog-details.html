<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Details | Mashhor Hub</title>
    <link rel="stylesheet" href="assets/css/mashhor-platform.css">
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .post-hero { padding: 120px 0 60px; text-align: center; background: linear-gradient(to bottom, rgba(7, 21, 43, 0.8), transparent); }
        .post-meta { color: var(--gold); font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
        .post-title { font-size: 3.5rem; max-width: 900px; margin: 0 auto 30px; line-height: 1.1; }
        .post-container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .post-image { width: 100%; border-radius: 24px; margin-bottom: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); }
        .post-content { font-size: 1.15rem; line-height: 1.8; color: #b9c7dc; }
        .post-content p { margin-bottom: 24px; }
        .post-content h2, .post-content h3 { color: var(--white); margin: 40px 0 20px; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--muted); text-decoration: none; font-size: 0.9rem; margin-bottom: 40px; transition: color 0.3s; }
        .back-link:hover { color: var(--gold); }
    </style>
</head>
<body>
    <div data-platform-header></div>
    
    <main>
        <section class="post-hero">
            <div class="post-container">
                <a href="index.html" class="back-link">← Back to Home</a>
                <div id="post-meta" class="post-meta">Loading...</div>
                <h1 id="post-title" class="post-title">...</h1>
            </div>
        </section>

        <section class="post-container">
            <img id="post-image" class="post-image" src="" alt="" style="display:none;">
            <div id="post-content" class="post-content">
                <div class="skeleton-text"></div>
                <div class="skeleton-text" style="width: 80%;"></div>
                <div class="skeleton-text" style="width: 90%;"></div>
            </div>
        </section>
    </main>

    <div data-platform-footer></div>

    <script src="assets/js/mashhor-platform.js"></script>
    <script src="assets/js/cms-bridge.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            if (slug) {
                // Bridge will handle the hydration based on slug
                CMSBridge.renderSinglePost(slug);
            }
        });
    </script>
</body>
</html>
