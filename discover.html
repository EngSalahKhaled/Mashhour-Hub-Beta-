<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اكتشف المشاهير | مشهور هب</title>
    <link rel="stylesheet" href="../assets/css/mashhor-platform.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0b; font-family: 'Alexandria', sans-serif; color: #fff; margin: 0; }
        .discover-container { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        
        .tag-row { display: flex; gap: 10px; margin-bottom: 40px; overflow-x: auto; padding-bottom: 15px; }
        .tag-pill { background: rgba(255, 255, 255, 0.05); color: #94a3b8; padding: 8px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .tag-pill.active { background: #8b5cf6; color: #fff; border-color: #8b5cf6; }

        .influencer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; }
        .inf-card { background: rgba(20, 20, 22, 0.8); border-radius: 25px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.05); text-align: center; transition: 0.4s; backdrop-filter: blur(15px); }
        .inf-card:hover { transform: translateY(-12px); border-color: #8b5cf6; }
        
        .inf-avatar { width: 100px; height: 100px; border-radius: 30px; margin: 0 auto 20px; border: 3px solid #8b5cf6; padding: 5px; }
        .inf-avatar img { width: 100%; height: 100%; border-radius: 25px; object-fit: cover; }

        .inf-name { font-weight: 800; font-size: 1.1rem; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .badge-verified { background: #3b82f6; color: #fff; font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; }
        
        .inf-field { color: #8b5cf6; font-size: 0.75rem; font-weight: 700; margin-bottom: 15px; display: block; }
        .inf-tags { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        .inf-tag { font-size: 0.65rem; background: rgba(255,255,255,0.03); padding: 3px 8px; border-radius: 6px; color: #94a3b8; }

        .btn-view { background: #fff; color: #000; width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-view:hover { background: #8b5cf6; color: #fff; }
    </style>
</head>
<body>
    <div class="discover-container">
        <h1 style="font-weight: 800; margin-bottom: 10px;">اكتشف المبدعين ✨</h1>
        <p style="color: #94a3b8; margin-bottom: 40px;">ابحث عن المشاهير وصناع المحتوى الأكثر تواجداً وتأثيراً</p>

        <div class="tag-row">
            <div class="tag-pill active">الكل</div>
            <div class="tag-pill">تكنولوجيا 💻</div>
            <div class="tag-pill">أزياء وموضة 👗</div>
            <div class="tag-pill">جيمنج 🎮</div>
            <div class="tag-pill">صحة وجمال 💄</div>
            <div class="tag-pill">أعمال واقتصاد 💰</div>
            <div class="tag-pill">سفر وسياحة ✈️</div>
        </div>

        <div class="influencer-grid" id="influencer-list">
            <!-- Dynamic Injection Example -->
        </div>
    </div>

    <script>
        const seedData = [
            { name: 'صلاح خالد', field: 'تكنولوجيا وذكاء اصطناعي', tags: ['AI', 'Tech'], username: 'salah' },
            { name: 'أحمد الرفاعي', field: 'جرافيك ديزاين', tags: ['Design', 'Art'], username: 'reda' },
            { name: 'نورة العبدالله', field: 'جمال وموضة', tags: ['Fashion', 'Beauty'], username: 'noura' },
            { name: 'فهد المطيري', field: 'سياحة وسفر', tags: ['Travel', 'Adventure'], username: 'fahad' },
            { name: 'ليلى القحطاني', field: 'أعمال واقتصاد', tags: ['Business', 'Investing'], username: 'layla' },
            { name: 'يوسف الهيرون', field: 'جيمنج وبث مباشر', tags: ['Gaming', 'Streaming'], username: 'yousef' }
        ];

        const list = document.getElementById('influencer-list');
        list.innerHTML = seedData.map(inf => `
            <div class="inf-card">
                <div class="inf-avatar"><img src="https://via.placeholder.com/100?text=${inf.name[0]}"></div>
                <div class="inf-name">${inf.name} <span class="badge-verified">✓</span></div>
                <span class="inf-field">${inf.field}</span>
                <div class="inf-tags">
                    ${inf.tags.map(t => `<span class="inf-tag">${t}</span>`).join('')}
                </div>
                <a href="u/profile.html?username=${inf.username}" class="btn-view">زيارة المتجر 🛒</a>
            </div>
        `).join('');
    </script>
</body>
</html>
