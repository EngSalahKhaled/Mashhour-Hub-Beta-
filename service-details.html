<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Details | Mashhor Hub</title>
    <link rel="stylesheet" href="assets/css/mashhor-platform.css">
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .service-hero { padding: 140px 0 80px; background: linear-gradient(135deg, #0d1528 0%, #07152b 100%); position: relative; overflow: hidden; }
        .service-hero::after { content: ''; position: absolute; top: 0; right: 0; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, transparent 70%); filter: blur(60px); z-index: 0; }
        .service-container { max-width: 1100px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
        .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
        .service-info h1 { font-size: 4rem; line-height: 1.1; margin-bottom: 24px; }
        .service-info p { font-size: 1.25rem; color: var(--muted); line-height: 1.7; margin-bottom: 40px; }
        .service-visual img { width: 100%; border-radius: 32px; box-shadow: 0 40px 80px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .cta-section { margin-top: 80px; padding: 60px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 40px; text-align: center; }
    </style>
</head>
<body>
    <div data-platform-header></div>
    
    <main>
        <section class="service-hero">
            <div class="service-container">
                <div class="service-grid">
                    <div class="service-info" data-aos="fade-right">
                        <span id="service-category" class="mini-label" style="color:var(--gold); margin-bottom:16px; display:inline-block; font-family: 'Alexandria', sans-serif; text-transform: uppercase; letter-spacing: 2px;">Service</span>
                        <h1 id="service-title" style="font-family: 'Space Grotesk', sans-serif;">Loading...</h1>
                        <p id="service-description" style="font-family: 'Alexandria', sans-serif;">Please wait while we fetch the details.</p>
                        <div class="hero-actions">
                            <a href="contact.html" class="button button-gold">Inquire Now</a>
                        </div>
                    </div>
                    <div class="service-visual" data-aos="zoom-in" data-aos-delay="200">
                        <div style="background: rgba(255,255,255,0.03); border-radius: 32px; overflow: hidden; aspect-ratio: 16/10; border: 1px solid rgba(255,255,255,0.1);">
                            <img id="service-image" src="assets/images/icons/logo.png" alt="Service Image" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.5;">
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="service-container">
            <div class="cta-section">
                <h2>Ready to scale?</h2>
                <p>Book a discovery call with our specialists to discuss this service for your brand.</p>
                <a href="https://wa.me/96555377309" class="button button-gold" style="margin-top: 24px; display: inline-flex;">WhatsApp Consultation</a>
            </div>
        </section>
    </main>

    <div data-platform-footer></div>

    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            AOS.init({ duration: 1000, once: true });
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (id) {
                CMSBridge.renderSingleService(id);
            }
        });
    </script>
</body>
</html>
